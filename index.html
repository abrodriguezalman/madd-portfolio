<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>Untitled</title>
  </head>
  
  <style>
    .tree-container{
      position: relative;
      width: 100%;
      height: 100vh;
      background-image: url('images/tree.svg');
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
    }
    
    .leaf-one{
      position: absolute;
      clip-path: circle(50% at 50% 50%);
      top: calc(50vh - 18vw);
      left: calc(50vw - 23vw);
      width: 10vw;
      height: 10vw;
      background: green;
    }
  
  </style>
  <body>
    <div class="tree-container">
      <div class="leaf-one"></div>
    </div>
  </body>
</html>
